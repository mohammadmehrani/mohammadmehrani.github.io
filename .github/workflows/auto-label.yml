name: Auto Label Issues
on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label based on content
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            const labels = [];

            if (/kubernetes|k8s|container|docker/.test(text)) labels.push('kubernetes');
            if (/ci\/?cd|pipeline|deploy|github actions/.test(text)) labels.push('ci-cd');
            if (/terraform|iac|infrastructure|opentofu/.test(text)) labels.push('infrastructure');
            if (/bug|error|fail|crash|broken/.test(text)) labels.push('bug');
            if (/enhancement|feature|improve|request/.test(text)) labels.push('enhancement');
            if (/security|vulnerability|cve|patch/.test(text)) labels.push('security');
            if (/monitoring|observability|grafana|prometheus/.test(text)) labels.push('monitoring');
            if (/docs|readme|documentation/.test(text)) labels.push('documentation');
            if (/question|help|howto|what is/.test(text)) labels.push('question');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
