name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links
        run: |
          if command -v lychee &> /dev/null; then
            lychee --no-progress --exclude "linkedin" --exclude "goftino" --exclude "qrserver" ./*.html
          else
            echo "lychee not available — skipping link check"
          fi

      - name: Validate HTML
        run: |
          if command -v tidy &> /dev/null; then
            tidy -e index.html 2>&1 || true
          else
            echo "tidy not available — skipping HTML validation"
          fi

